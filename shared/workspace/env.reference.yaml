---
############################# Environment Variables ############################
#
# Purpose:
#   Canonical reference for every `WS_*` environment variable recognized by
#   **Kloud Workspace**.
#
# The file is used in:
#   - Automated tests
#   - Documentation builds
#   - Startup scripts
#
# Naming rules:
#   - Live variables use the section-prefixed form `WS_<GROUP>_<NAME>`
#   - Historical aliases live under `deprecated:` with:
#
################################################################################

envs:
  apt:
    name: APT
    properties:
      additional_gpg_keys:
        type: string
        default: null
        delimiter: " "
        reference: /tools/apt
        example: >-
          name1:keys.example.com/key1.asc name2:keys.example.com/key2.gpg
        description: List of trusted GPG pairs.
        longDescription: |
          Accepts a **space-delimited** list of `name:url` pairs installed to
          `/etc/apt/keyrings`.

          The key file is downloaded and saved as `/etc/apt/keyrings/<name>.gpg`.
          If you list more than one URL, separate them with **spaces**.

      additional_insecure_gpg_keys:
        type: string
        default: null
        delimiter: " "
        since: 0.1.0
        reference: /tools/apt
        example: >-
          name1:http://keys.example.com/key1.asc name2:https://untrusted.com/key2.gpg
        description: List of trusted GPG pairs *(HTTP or insecure HTTPS)*.
        longDescription: |
          Accepts a **space-delimited** list of `name:url` pairs installed to
          `/etc/apt/keyrings`.

          Supports both HTTP and HTTPS URLs. For HTTPS URLs, certificate
          validation is bypassed using insecure connections.

          The key file is downloaded and saved as `/etc/apt/keyrings/<name>.gpg`.
          If you list more than one URL, separate them with **spaces**.

          **Use only in fully trusted network environments.**

      additional_packages:
        type: string
        default: null
        delimiter: " "
        reference: /tools/apt
        example: cmake nano
        description: Additional APT packages installed during startup.
        longDescription: |
          Accepts a **space-delimited** package list.

      additional_repos:
        type: string
        default: null
        delimiter: ;
        pattern: "[a-zA-Z0-9 ./:_=~+[\\]-]+"
        reference: /tools/apt
        example: >-
          deb http://one.test trixie main; deb http://two.test trixie main
        description: Appends additional repository lines to `/etc/apt/sources.list`.
        longDescription: |
          Accepts a **semicolon-delimited** list of full `deb` entries.

          Each entry is copied as is, you're responsible for correct suite
          *(`trixie`)* and component names *(`main`, `contrib`, ...)*.

      disable_repos:
        type: string
        default: null
        delimiter: " "
        reference: /tools/apt
        example: debian additional
        description: Disables specified APT repositories or all repositories.
        since: 0.0.22
        longDescription: |
          This is useful when you rely exclusively on a private mirror.

          Accepts either:
          - A **space-delimited** list of repository names *(`debian`, `additional`, `trixie`)*.
          - A boolean `true` or `*` value to disable all repositories.

      disable_restrictions:
        type: string
        default: null
        delimiter: " "
        since: 0.3.0
        reference: /tools/apt
        example: x11 mail
        description: Disables specified APT install restrictions or all restrictions.
        longDescription: |
          The workspace ships with a set of preference files that block
          GUI/desktop and other packages that have no use inside a headless
          container *(`x11`, `desktop`, `mail`, `printing`, `daemons`,
          `cni`, `language-pack`, `obsolete`)*.

          Accepts either:
          - A **space-delimited** list of restriction names.
          - A boolean `true` or `*` value to disable all restrictions.

      override_restrictions:
        type: boolean
        default: false
        since: 0.3.0
        reference: /tools/apt
        example: "true"
        description: Temporarily lifts all APT install restrictions for `additional_packages`.
        longDescription: |
          Distinct from `disable_restrictions`, which **permanently** lifts
          restrictions at startup. This flag applies **only** to the
          `additional_packages` install step: every active
          `/etc/apt/preferences.d/99-deny-*` pin is renamed to `.disabled`
          immediately before the install and restored when it completes
          *(including on failure)*.

          Set to `true` when an entry in `additional_packages` is blocked by
          a shipped restriction and a permanent lift is undesirable.

      update_cache:
        type: boolean
        default: false
        since: 0.0.20
        reference: /tools/apt
        description: Forces `apt-get update` before any package action.

  auth:
    properties:
      disable_sudo:
        type: boolean
        default: false
        since: 0.0.2
        description: Disables password-less `sudo`.

      github_token:
        type: string
        default: null
        secret: true
        since: 0.3.0
        example: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        description: GitHub personal access token for the workspace and `gh`.
        reference: /editor/authentication
        longDescription: |
          Authenticates the workspace's GitHub provider and, when the
          opt-in `gh` feature is installed, runs `gh auth login --with-token`.
          Terminal `git` HTTPS auth is not wired — use SSH or a credential
          helper.

          **Resolution chain:**

          1. Env literal: `WS_AUTH_GITHUB_TOKEN=ghp_...`.
          2. `file:` env value: `WS_AUTH_GITHUB_TOKEN=file:/path/to/token`.
          3. Convention default: file mounted at
             `/run/secrets/workspace/auth/github_token`.
          4. Schema default *(unset)*.

      mode:
        type: string
        default: password
        since: 0.3.1
        example: oidc
        description: Web authentication mode, either `password` or `oidc`.
        reference: /editor/authentication
        longDescription: |
          - `password` *(default)*: the editor's built-in password login via
            `WS_AUTH_PASSWORD` / `WS_AUTH_PASSWORD_HASHED`. Unchanged behaviour.
          - `oidc`: an in-workspace oauth2-proxy listens on
            `WS_SERVER_AUTH_PROXY_PORT` and authenticates every request against
            `WS_AUTH_OIDC_ISSUER` before forwarding to the editor, which binds
            loopback-only on `WS_SERVER_PORT`. Requires `WS_AUTH_OIDC_ISSUER`,
            `WS_AUTH_OIDC_CLIENT_ID` and `WS_AUTH_OIDC_CLIENT_SECRET`. Publish
            the proxy port.

          Any other value is treated as `password`.

      oidc_allowed_emails:
        type: string
        default: null
        delimiter: " "
        since: 0.3.1
        example: alice@corp.com bob@corp.com
        description: Restrict OIDC login to an explicit email allowlist.
        reference: /editor/authentication
        longDescription: |
          A **space-delimited** list. When unset, any email the IdP
          authenticates is allowed. `oidc` assumes a single-user workspace
          whose authorization is enforced upstream. Only used when
          `WS_AUTH_MODE=oidc`.

      oidc_allowed_groups:
        type: string
        default: null
        delimiter: " "
        since: 0.3.1
        example: engineering platform
        description: Restrict OIDC login to members of these IdP groups.
        reference: /editor/authentication
        longDescription: |
          A **space-delimited** list mapped to oauth2-proxy `--allowed-group`.
          Only used when `WS_AUTH_MODE=oidc`.

      oidc_client_id:
        type: string
        default: null
        since: 0.3.1
        example: workspace
        description: OIDC client ID. Required when `WS_AUTH_MODE=oidc`.
        reference: /editor/authentication

      oidc_client_secret:
        type: string
        default: null
        secret: true
        since: 0.3.1
        description: OIDC client secret. Required when `WS_AUTH_MODE=oidc`.
        reference: /editor/authentication
        longDescription: |
          Required for oidc mode. oauth2-proxy authenticates to the IdP as a
          confidential client and refuses to start without it. PKCE
          (`--code-challenge-method=S256`) is layered on top as defence in
          depth. Register the workspace as a confidential client and supply its
          secret here. Never baked or shared, provide it per deployment via the
          resolution chain below.

          **Resolution chain:**

          1. Env literal: `WS_AUTH_OIDC_CLIENT_SECRET=...`.
          2. `file:` env value: `WS_AUTH_OIDC_CLIENT_SECRET=file:/path/to/secret`.
          3. Convention default: file mounted at
             `/run/secrets/workspace/auth/oidc_client_secret`.
          4. Schema default *(unset)*.

      oidc_cookie_secret:
        type: string
        default: null
        secret: true
        since: 0.3.1
        description: Secret that signs and encrypts the oauth2-proxy session cookie.
        reference: /editor/authentication
        longDescription: |
          A 16, 24, or 32-byte secret (raw or base64). When unset it is
          generated once and persisted under the workspace home so sessions
          survive restarts and redeploys that reattach the volume. For
          multi-replica or volume-less deployments, set this to a shared value
          so every instance signs cookies identically. Only used when
          `WS_AUTH_MODE=oidc`.

          **Resolution chain:**

          1. Env literal: `WS_AUTH_OIDC_COOKIE_SECRET=...`.
          2. `file:` env value: `WS_AUTH_OIDC_COOKIE_SECRET=file:/path/to/secret`.
          3. Convention default: file mounted at
             `/run/secrets/workspace/auth/oidc_cookie_secret`.
          4. Generated and persisted *(unset)*.

      oidc_forbidden_message:
        type: string
        default: Contact your administrator to request access; retrying will not help.
        since: 0.3.1
        example: Contact the platform team to request access.
        description: Custom guidance shown on the OIDC not-authorized (403) page.
        reference: /editor/authentication
        longDescription: |
          Replaces the default guidance on the 403 error page shown when an
          authenticated user is denied (failed group/email allowlist). When
          unset, a default "contact your administrator" message is shown. Only
          used when `WS_AUTH_MODE=oidc`.

      oidc_issuer:
        type: string
        default: null
        since: 0.3.1
        example: https://idp.example.com
        description: OIDC issuer URL. Required when `WS_AUTH_MODE=oidc`.
        reference: /editor/authentication
        longDescription: |
          The OpenID Connect issuer (discovery base URL). For Active Directory,
          point at an OIDC-fronting issuer (Entra ID, Keycloak, dex) rather than
          raw LDAP.

      oidc_redirect_url:
        type: string
        default: null
        since: 0.3.1
        example: https://ws.example.com/oauth2/callback
        description: Explicit OAuth redirect URL override.
        reference: /editor/authentication
        longDescription: |
          When unset, oauth2-proxy derives the callback from the incoming
          request host as `https://<host>/oauth2/callback`. Set this when the
          externally-visible host differs from what oauth2-proxy can infer
          (e.g. behind a terminator that rewrites the Host header). The in-IDE
          logout action also uses this value to build the sign-out URL. Only
          used when `WS_AUTH_MODE=oidc`.

      oidc_scopes:
        type: string
        default: openid email profile
        delimiter: " "
        since: 0.3.1
        example: openid email profile groups
        description: OAuth scopes requested at login.
        reference: /editor/authentication
        longDescription: |
          A **space-delimited** scope list requested from the IdP. Add `groups`
          when you use `WS_AUTH_OIDC_ALLOWED_GROUPS` and your IdP exposes a
          `groups` scope. Only used when `WS_AUTH_MODE=oidc`.

      password:
        type: string
        default: null
        secret: true
        since: 0.0.20
        example: super_duper_secret
        description: Plaintext password for web login.
        reference: /editor/authentication
        longDescription: |
          Use only in ephemeral or local environments, never in shared or
          production deployments.

          **Resolution chain:**

          1. Env literal: `WS_AUTH_PASSWORD=mySecret`.
          2. `file:` env value: `WS_AUTH_PASSWORD=file:/path/to/password`.
          3. Convention default: file mounted at
             `/run/secrets/workspace/auth/password`.
          4. Schema default *(unset)*.

          `WS_AUTH_PASSWORD_HASHED` takes precedence over this when both
          resolve to a non-empty value.

      password_hashed:
        type: string
        default: null
        secret: true
        since: 0.0.20
        example: >-
          $argon2i$v=19$m=4096,t=3,p=1$...$...
        description: Argon2 hash used for web login.
        reference: /editor/authentication
        longDescription: |
          Takes precedence over plaintext password when both are set.

          **Resolution chain:**

          1. Env literal: `WS_AUTH_PASSWORD_HASHED=<argon2-hash>`.
          2. `file:` env value: `WS_AUTH_PASSWORD_HASHED=file:/path/to/hash`.
          3. Convention default: file mounted at
             `/run/secrets/workspace/auth/password_hashed`.
          4. Schema default *(unset)*.

  ca:
    name: Enterprise CA
    properties:
      additional_cert_endpoints:
        type: string
        default: null
        delimiter: " "
        since: 0.0.20
        reference: /settings/enterprise-ca
        example: https://corp.com/ca.pem https://alt.com/root.crt
        description: URLs of additional CA certificates to trust *(HTTPS only)*.
        longDescription: |
          Accepts a **space-delimited** URL list pointing to a PEM-encoded
          certificate. Only HTTPS URLs are supported for secure certificate
          retrieval.

      additional_cert_insecure_endpoints:
        type: string
        default: null
        delimiter: " "
        since: 0.0.22
        reference: /settings/enterprise-ca
        example: http://corp.com/ca.pem https://untrusted.com/root.crt
        description: >-
          URLs of additional CA certificates to trust *(HTTP or insecure HTTPS)*.
        longDescription: |
          Accepts a **space-delimited** URL list pointing to a PEM-encoded
          certificate. Supports both HTTP and HTTPS URLs. For HTTPS URLs,
          certificate validation is bypassed using insecure connections.

          **Use only in fully trusted network environments.**

  claude:
    properties:
      statusline_disable:
        type: boolean
        default: false
        since: 0.2.0
        reference: /tools/claude
        description: Disables the Claude Code statusline.

      statusline_hide_context_bar:
        type: boolean
        default: false
        since: 0.2.0
        reference: /tools/claude
        description: Hides the context usage bar in the Claude statusline.

      statusline_hide_git:
        type: boolean
        default: false
        since: 0.2.0
        reference: /tools/claude
        description: Hides git branch and status in the Claude statusline.

      statusline_hide_lines_changed:
        type: boolean
        default: false
        since: 0.2.0
        reference: /tools/claude
        description: Hides lines added/removed in the Claude statusline.

      statusline_hide_model:
        type: boolean
        default: false
        since: 0.2.0
        reference: /tools/claude
        description: Hides the model name in the Claude statusline.

      statusline_script:
        type: path
        default: /etc/claude-code/statusline.zsh
        since: 0.2.0
        reference: /tools/claude
        description: Path to the statusline script.

      statusline_shell:
        type: string
        default: zsh
        since: 0.2.0
        reference: /tools/claude
        description: Shell used to execute the statusline script.

  cloudflared:
    properties:
      tunnel_token:
        type: string
        default: null
        secret: true
        since: 0.3.1
        description: Cloudflare tunnel connector token.
        reference: /tools/cloudflared
        longDescription: |
          Connector credential for a remotely-managed *(dashboard or API
          created)* Cloudflare named tunnel. When set, and the opt-in
          `cloudflared` feature is installed — the tunnel starts automatically
          under s6 supervision *(`cloudflared tunnel --no-autoupdate run`)* and
          restarts on death. When unset, the tunnel stays dormant. Never baked
          or shared, provide it per deployment via the resolution chain below.

          **Resolution chain:**

          1. Env literal: `WS_CLOUDFLARED_TUNNEL_TOKEN=...`.
          2. `file:` env value: `WS_CLOUDFLARED_TUNNEL_TOKEN=file:/path/to/token`.
          3. Convention default: file mounted at
             `/run/secrets/workspace/cloudflared/tunnel_token`.
          4. Schema default *(unset)*.

  docker:
    properties:
      enable_client:
        reference: /tools/docker
        type: boolean
        default: false
        since: 0.0.20
        description: Enables Docker inside the container.

  editor:
    properties:
      additional_vs_extensions:
        type: string
        default: null
        delimiter: " "
        since: 0.0.20
        example: dbaeumer.vscode-eslint esbenp.prettier-vscode
        description: Installs these Marketplace extension IDs at startup.
        longDescription: |
          Accepts a **space-delimited** list of extensions.
        reference: /editor/extensions

      comments_disable_font:
        type: boolean
        default: false
        since: 0.0.20
        description: Disables the custom font used for code comments.
        reference: /editor/theme-and-fonts

      scrollbar_size:
        type: string
        default: 2px
        since: 0.0.21
        description: Editor's scrollbar size.
        longDescription: |
          You may pass either a bare number *(`6`, becomes `6px`)* or
          the full CSS value with the `px` suffix *(i.e. `6px`)*.

      settings_merge:
        type: string
        default: null
        since: 0.1.2
        reference: /editor/settings
        description: JSON object to deep merge into VSCode `settings.json`.
        longDescription: |
          Values are merged recursively, existing settings not specified are preserved.

          For large configs, use `WS_EDITOR_SETTINGS_MERGE_FILE`.
        example: >-
          {"editor.fontSize": 16, "[python]": {"editor.tabSize": 4}}

      settings_merge_file:
        type: path
        default: null
        since: 0.1.2
        reference: /editor/settings
        description: Path to a JSON file to deep merge into VSCode `settings.json`.
        longDescription: |
          Alternative to `WS_EDITOR_SETTINGS_MERGE` for larger configurations.
        example: /workspace/.settings-override.json

      settings_override:
        type: string
        default: null
        since: 0.1.2
        reference: /editor/settings
        description: JSON object to completely replace VSCode settings.json.
        longDescription: |
          **WARNING:** Removes all default workspace settings.

          Use `WS_EDITOR_SETTINGS_MERGE` for partial updates.
        example: >-
          {"editor.fontSize": 16}

      settings_override_file:
        type: path
        default: null
        since: 0.1.2
        reference: /editor/settings
        description: Path to a JSON file to completely replace VSCode `settings.json`.
        longDescription: |
          Alternative to `WS_EDITOR_SETTINGS_OVERRIDE` for larger configurations.
        example: /workspace/.settings.json

      trusted_domains:
        type: string
        default: null
        delimiter: ","
        pattern: "[a-zA-Z0-9.:/_~?#=&%+-]+"
        since: 0.2.0
        example: >-
          https://github.com,https://stackoverflow.com
        description: >-
          Comma-separated list of trusted domains that bypass link
          confirmation prompts.
        longDescription: |
          When a link matching one of these domains is clicked in the editor,
          it opens directly in the browser without prompting for user
          confirmation.

          Accepts a **comma-delimited** list of domain URL patterns.

          The editor ships with `https://open-vsx.org` trusted by default
          (via `product.json`); entries from this variable are added on top.

  features:
    properties:
      additional_features:
        reference: /editor/features
        type: string
        default: null
        delimiter: " "
        since: 0.0.20
        example: dotnet jupyter
        description: Installs additional feature at startup.
        longDescription: |
          Accepts a **space-delimited** list of features.

      dir:
        type: path
        default: /usr/share/workspace/features.d
        reference: /editor/features
        since: 0.20.0
        description: Directory path where additional features are located.
        longDescription: |
          Specify the full path to the directory containing the features
          to be loaded or referenced at startup.

      store_allow_fallback:
        type: boolean
        default: false
        since: 0.3.0
        reference: /editor/features#feature-store
        description: Allow upstream Debian fallback on older-drift detection.
        longDescription: |
          When the ws-feature-store serves a package strictly older than what
          the workspace already has installed, opt into temporarily re-enabling
          `debian.sources` for this install. Only effective when
          `WS_APT_DISABLE_REPOS` does NOT cover `debian`. In air-gapped
          deployments (no path to `deb.debian.org`) this knob has no effect —
          the install proceeds via the per-install Pin fragment regardless.

      store_url:
        type: string
        default: null
        since: 0.2.0
        example: http://feature-store.local:8080
        reference: /editor/features#feature-store
        description: URL of a ws-feature-store instance used as a local mirror.
        longDescription: |
          When set, workspace features that require third-party APT repositories
          (e.g. cloudflared, gcloud, gh, etc.) will fetch packages from
          this URL instead of enabling individual vendor repositories.

  git:
    properties:
      clear_notebook_output:
        type: boolean
        default: false
        since: 0.0.22
        reference: /tools/git
        description: Clears outputs from Jupyter notebooks during git operations.
        longDescription: |
          When `true`, the git filter removes execution outputs and execution
          counts from `.ipynb` files when they are staged for commit.
          This helps keep repository history clean by excluding dynamic
          output data.

      clone_repo:
        type: string
        default: null
        since: 0.0.20
        example: https://github.com/example/repo.git
        reference: /tools/git
        description: Clones this repository into `${WS_SERVER_ROOT}` at startup.
        longDescription: |
          The clone happens only if the target directory is empty.
          Supports HTTPS and SSH URLs *(requires configured SSH keys)*.

      credential_cache_timeout:
        type: integer
        default: 3600
        reference: /tools/git
        description: Lifetime *(seconds)* of cached Git credentials.
        longDescription: |
          Providing a value of `-1` will set the cache timeout to 1
          year *(31536000 seconds)*.

  helm:
    properties:
      preload_cache:
        reference: /tools/helm
        type: boolean
        default: false
        since: 0.0.20
        description: Restores the Helm repo cache.

  logging:
    properties:
      auth_proxy_file:
        type: string
        default: auth-proxy.log
        description: Log file for the OIDC authentication proxy.
        since: 0.3.1

      cloudflared_file:
        type: string
        default: cloudflared.log
        description: Log file for the Cloudflared tunnel.
        since: 0.3.1

      dir:
        type: path
        default: /var/log/workspace
        description: Base directory for all workspace logs.
        since: 0.0.21

      disable_console_output:
        type: boolean
        default: false
        description: Disable console logging.
        longDescription: |
          When `true`, console logging will not be redirected to
          `stdout/stderr`, however, logs will still be stored on disk at
          `"${WS_LOGGING_DIR}/${WS_LOGGING_MAIN_FILE}"`.
        since: 0.0.22

      docker_file:
        type: string
        default: dockerd.log
        description: Log file for the in-container Docker daemon.
        since: 0.3.0

      main_file:
        type: string
        default: workspace.log
        description: Combined log file for `stdout` and `stderr`.
        since: 0.0.21

      metrics_file:
        type: string
        default: metrics.log
        description: Log file for the metrics exporter.
        since: 0.3.0

  metrics:
    properties:
      collectors:
        type: string
        default: "*"
        delimiter: ","
        since: 0.1.2
        example: workspace,container.cpu,gpu
        description: Comma-separated list of metric collectors to enable.
        longDescription: |
          Accepts a **comma-delimited** list of collectors with dot-notation
          for granularity.

          **Available collectors:**

          | Collector              | Description                         |
          | ---------------------- | ----------------------------------- |
          | `workspace`            | All workspace metrics               |
          | `workspace.info`       | Workspace build info                |
          | `workspace.session`    | Session timestamp and uptime        |
          | `workspace.extensions` | Installed extensions count          |
          | `container`            | All container metrics               |
          | `container.cpu`        | CPU usage metrics                   |
          | `container.memory`     | Memory usage metrics                |
          | `container.fs`         | Filesystem usage metrics            |
          | `container.fd`         | File descriptor metrics             |
          | `container.pids`       | Process metrics                     |
          | `pressure`             | All pressure metrics                |
          | `pressure.cpu`         | CPU pressure metrics                |
          | `pressure.memory`      | Memory pressure metrics             |
          | `pressure.io`          | IO pressure metrics                 |
          | `network`              | Network metrics                     |
          | `sockets`              | Socket metrics                      |
          | `io`                   | IO metrics                          |
          | `gpu`                  | GPU metrics *(requires nvidia-smi)* |

          When unset or `*`, all collectors are enabled *(gpu, if available)*.

      enable:
        type: boolean
        default: false
        since: 0.1.2
        description: Enables the Prometheus metrics exporter.
        longDescription: |
          When `true`, starts a metrics server that exposes Prometheus-compatible
          metrics at `/` on the configured port.

          Metrics include workspace info, session data, extensions count,
          and container resource usage *(CPU, memory, disk, file descriptors)*.

      port:
        type: integer
        default: 9100
        since: 0.1.2
        description: Port on which the metrics endpoint listens.
        longDescription: |
          The metrics server exposes a `/` endpoint on this port.
          Default port `9100` follows the `node_exporter` convention.

  npm:
    name: npm
    properties:
      additional_packages:
        type: string
        default: null
        delimiter: " "
        since: 0.3.1
        example: prettier@3.2.5 @angular/cli
        description: Additional global npm packages installed during startup.
        longDescription: |
          Accepts a **space-delimited** package list. Each entry is a full npm
          spec, so `@version` pins *(`prettier@3.2.5`)* and scoped packages
          *(`@angular/cli`)* are supported.

  pip:
    name: pip
    properties:
      additional_packages:
        type: string
        default: null
        delimiter: " "
        since: 0.3.1
        reference: /tools/python
        example: httpx==0.27.0 rich
        description: Additional global Python packages installed during startup.
        longDescription: |
          Accepts a **space-delimited** package list. Each entry is a full pip
          spec, so `==` pins *(`httpx==0.27.0`)* and extras *(`rich[jupyter]`)*
          are supported. For installable CLI tools prefer
          `WS_UV_ADDITIONAL_TOOLS`.

  secrets:
    properties:
      master_key:
        type: string
        default: null
        secret: true
        example: dGhpcyBpcyBhIHNlY3JldCBrZXkgZXhhbXBsZQ==
        since: 0.1.1
        description: Master encryption key for secrets vault.
        longDescription: |
          Used to encrypt and decrypt secrets in the vault.
          Can be provided as:

          - A base64-encoded string.
          - A plaintext string.

          **Resolution chain:**

          1. CLI `--master` flag *(if provided)*.
          2. Env literal: `WS_SECRETS_MASTER_KEY=<key>`.
          3. `file:` env value: `WS_SECRETS_MASTER_KEY=file:/path/to/key`.
          4. Convention default: file mounted at
             `/run/secrets/workspace/secrets/master_key`.
          5. Schema default *(unset)*.

  server:
    properties:
      auth_proxy_port:
        type: integer
        default: 38080
        since: 0.3.1
        description: Port the OIDC auth proxy listens on when WS_AUTH_MODE is oidc.
        reference: /editor/authentication
        longDescription: |
          When WS_AUTH_MODE=oidc the auth proxy listens on this port and
          forwards authenticated traffic to the editor on WS_SERVER_PORT.
          Publish this port instead of WS_SERVER_PORT so every request is
          authenticated before it reaches the editor.

      port:
        type: integer
        default: 8080
        since: 0.0.20
        description: Port on which the web server listens.

      proxy_domain:
        type: string
        default: null
        delimiter: " "
        pattern: "[a-zA-Z0-9.{}_-]+"
        since: 0.0.20
        example: ws.dev local.ws.dev
        description: >-
          Domain suffix used to expose server's forwarded ports.
        longDescription: >-
          Accepts either a single domain suffix or multiple
          **space-delimited** suffixes. Each suffix is exposed as
          `{{port}}.<suffix>`; the `{{port}}.` prefix is added automatically
          unless the suffix already contains a `{{port}}` placeholder
          (e.g. `{{port}}-project.ws.dev`). Wildcards are not accepted.
          > Multiple domain support was added in `v0.0.22`.
        reference: /editor/port-forwarding

      root:
        type: path
        default: /workspace
        since: 0.0.20
        description: Root directory for the workspace.
        longDescription: |
          **This should only be overridden in extreme cases.**

      ssl_cert:
        type: path
        default: null
        secret: true
        reference: /settings/https
        example: /etc/workspace/ssl/server.crt
        since: 0.0.21
        description: Inline PEM or `file:` path for the server certificate.
        longDescription: |
          Accepts either:
          - Literal certificate body starting with `-----BEGIN CERTIFICATE-----`
              *(newline characters may be provided as `\n` escapes)*.
          - A `file:` env value: `WS_SERVER_SSL_CERT=file:/path/to/server.crt`.

          **Resolution chain:**

          1. Env literal *(inline PEM)*.
          2. `file:` env value *(reads the file at the given path)*.
          3. Convention default: file mounted at
             `/run/secrets/workspace/server/ssl_cert`.
          4. Schema default *(unset)*.

          When this is unset but `WS_SERVER_SSL_KEY` is provided, the
          key is reused to mint a self-signed certificate for
          `WS_SERVER_SSL_HOSTS` *(or `localhost`)*.

      ssl_hosts:
        type: string
        default: localhost
        reference: /settings/https
        example: ws.dev *.ws.dev
        since: 0.0.21
        description: Space-delimited DNS names for self-signed certificate.

      ssl_key:
        type: path
        default: null
        secret: true
        reference: /settings/https
        since: 0.0.21
        example: /etc/workspace/ssl/server.key
        description: Inline PEM or `file:` path for the private key.
        longDescription: |
          Accepts either:
          - Literal key body starting with `-----BEGIN PRIVATE KEY-----`
              *(newline characters may be provided as `\n` escapes)*.
          - A `file:` env value: `WS_SERVER_SSL_KEY=file:/path/to/server.key`.

          **Resolution chain:**

          1. Env literal *(inline PEM)*.
          2. `file:` env value *(reads the file at the given path)*.
          3. Convention default: file mounted at
             `/run/secrets/workspace/server/ssl_key`.
          4. Schema default *(unset)*.

      ssl_root:
        type: path
        default: /etc/workspace/ssl
        reference: /settings/https
        since: 0.3.0
        description: Root directory for self-signed SSL artifacts.
        longDescription: |
          Directory where startup writes the generated self-signed certificate
          and private key when `WS_SERVER_SSL_KEY` is supplied without
          `WS_SERVER_SSL_CERT`.

          **This is a structural path; overrides are discouraged.**

  startup:
    properties:
      fail_on_error:
        type: boolean
        default: false
        since: 0.0.21
        description: Fail fast if any startup script exits non-zero.
        longDescription: |
          When `true`, the autoloader stops at the first failing startup
          or entrypoint and the container startup exits non-zero.


  terminal:
    properties:
      prompt_hide_docker_context:
        type: boolean
        default: false
        since: 0.0.20
        reference: /editor/terminal
        description: Hides Docker context info in the prompt.

      prompt_hide_hostname:
        type: boolean
        default: false
        since: 0.0.20
        reference: /editor/terminal
        description: Hides the container hostname in the prompt.

      prompt_hide_kubernetes_context:
        type: boolean
        default: false
        since: 0.0.20
        reference: /editor/terminal
        description: Hides current Kubernetes context in the prompt.

      prompt_hide_nodejs_version:
        type: boolean
        default: false
        since: 0.0.20
        reference: /editor/terminal
        description: Hides active Node.js version in the prompt.

      prompt_hide_python_version:
        type: boolean
        default: false
        since: 0.0.20
        reference: /editor/terminal
        description: Hides active Python version in the prompt.

      prompt_hide_user:
        type: boolean
        default: false
        since: 0.0.20
        reference: /editor/terminal
        description: Hides the current user in the prompt.

  uv:
    name: uv
    properties:
      additional_tools:
        type: string
        default: null
        delimiter: " "
        since: 0.3.1
        reference: /tools/python
        example: ruff poetry==1.8.0
        description: Additional global Python CLI tools installed during startup.
        longDescription: |
          Accepts a **space-delimited** package list. Each entry is a full uv
          spec, so `==` pins *(`poetry==1.8.0`)* are supported. Installs global
          CLI tools only — for importable libraries use
          `WS_PIP_ADDITIONAL_PACKAGES`.

  zsh:
    properties:
      additional_plugins:
        type: string
        default: null
        delimiter: " "
        pattern: "[a-zA-Z0-9_-]+"
        since: 0.0.20
        example: php
        description: Loads additional `oh-my-zsh` plugins.
        longDescription: |
          Accepts a **space-delimited** list of plugin names appended to the
          built-in `oh-my-zsh` plugin set.

      fzf_history_args:
        type: string
        default: +s +m -x -e --preview-window=hidden
        since: 0.1.1
        reference: /editor/terminal
        description: Default arguments passed to `fzf` for history search.

      fzf_history_bind:
        type: string
        default: ^r
        since: 0.1.1
        reference: /editor/terminal
        description: Key binding that triggers fzf history search.

      fzf_history_dates_in_search:
        type: boolean
        default: false
        since: 0.1.1
        reference: /editor/terminal
        description: Includes ISO 8601 date timestamps in search results.

      fzf_history_end_of_line:
        type: string
        default: null
        since: 0.1.1
        reference: /editor/terminal
        description: Moves cursor to end-of-line after selecting a history entry.

      fzf_history_event_numbers:
        type: boolean
        default: false
        since: 0.1.1
        reference: /editor/terminal
        description: Shows event numbers in history search results.

      fzf_history_extra_args:
        type: string
        default: null
        since: 0.1.1
        reference: /editor/terminal
        description: Additional arguments appended to the default `fzf` arguments.

      fzf_history_query_prefix:
        type: string
        default: null
        since: 0.1.1
        reference: /editor/terminal
        description: Prefix prepended to the fzf query when the buffer is non-empty.

      fzf_history_remove_duplicates:
        type: boolean
        default: true
        since: 0.1.1
        reference: /editor/terminal
        description: Removes duplicate entries from history search results.

      plugins:
        type: string
        default: >-
          1password auto-venv docker encode64 fzf-history git
          golang helm kubectl npm python pip
          ssh-agent yarn zsh-autosuggestions
        delimiter: " "
        pattern: "[a-zA-Z0-9_-]+"
        example: kubectl npm python pip
        description: Enables built-in `oh-my-zsh` plugins.
        longDescription: |
          Accepts a **space-delimited** list of plugin names. Replaces the
          default plugin set; use `WS_ZSH_ADDITIONAL_PLUGINS` to extend it
          instead.


