---
############################## Extensions Manifest #############################
#
# Purpose:
#   Lists all prepackaged VSCode extensions baked into the workspace image
#
# The file is used in:
#   - Image build (rendered to extensions.sh via extensions.sh.j2)
#   - Automated tests
#   - Documentation builds (distributed via ws-meta to ws-docs)
#
# Schema (per entry):
#   name:         friendly name shown in docs
#   license:      ws-docs vocabulary (MIT, Apache 2, EPL 2, GPL 3, MPL 2,
#                 BSD, ISC, Other) — NOT SPDX
#   home:         upstream project repository (open-vsx `repository` field,
#                 trailing `.git` stripped)
#   version:      optional pin; rendered as Publisher.Id@version into
#                 `code --install-extension`
#
# Entry-key rules:
#   - The top-level key is the full `Publisher.Id` (case-preserved per
#     marketplace canonical) — that same key is the install identifier
#   - Entries sorted alphabetically by key, case-insensitive
################################################################################
extensions:
  Anthropic.claude-code:
    name: Claude Code for VS Code
    license: Other
    home: https://github.com/anthropics/claude-code

  Catppuccin.catppuccin-vsc:
